<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Websockets</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4C1D95 0%, #7E22CE 50%, #BE185D 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }
        
        /* Animated Blobs */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.6;
            animation: float 20s infinite ease-in-out;
        }
        
        .blob-1 {
            width: 400px;
            height: 400px;
            background: #A855F7;
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }
        
        .blob-2 {
            width: 350px;
            height: 350px;
            background: #EC4899;
            top: 50%;
            right: -100px;
            animation-delay: 5s;
        }
        
        .blob-3 {
            width: 300px;
            height: 300px;
            background: #6366F1;
            bottom: -100px;
            left: 30%;
            animation-delay: 10s;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            25% {
                transform: translate(50px, 50px) scale(1.1);
            }
            50% {
                transform: translate(0, 100px) scale(1);
            }
            75% {
                transform: translate(-50px, 50px) scale(0.9);
            }
        }
        
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            max-width: 600px;
            width: 100%;
            position: relative;
            z-index: 10;
        }
        
        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .subtitle {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 40px;
        }
        
        .nav-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .btn {
            padding: 15px 30px;
            font-size: 1.1em;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: block;
            color: white;
            background: linear-gradient(135deg, #A855F7 0%, #EC4899 50%, #9333EA 100%);
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(168, 85, 247, 0.4);
        }
        
        .features {
            display: flex;
            justify-content: space-around;
            margin-top: 40px;
            gap: 20px;
        }
        
        .feature {
            text-align: center;
            flex: 1;
        }
        
        .feature-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            font-size: 1.5em;
        }
        
        .feature-vrienden {
            background: #D8B4FE;
        }
        
        .feature-veilig {
            background: #6EE7B7;
        }
        
        .feature-snel {
            background: #FDE047;
        }
        
        .feature-text {
            color: #666;
            font-size: 0.9em;
            font-weight: 600;
        }
        
        .footer {
            margin-top: 40px;
            color: #999;
            font-size: 0.9em;
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 40px 20px;
            }
            
            h1 {
                font-size: 2em;
            }
            
            .btn {
                padding: 12px 20px;
                font-size: 1em;
            }
            
            .features {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    
    <div class="container">
        <h1>Welcome</h1>
        <p class="subtitle">Kies een optie om te beginnen</p>
        
        <div class="nav-buttons">
            <a href="#" class="btn">Start Nieuwe Sessie</a>
            <a href="#" class="btn">Deelnemen aan Sessie</a>
            <a href="#" class="btn">Bekijk Documenten</a>
            <a href="#" class="btn">Instellingen</a>
        </div>
        
        <div class="features">
            <div class="feature">
                <div class="feature-icon feature-vrienden">👥</div>
                <div class="feature-text">Vrienden</div>
            </div>
            <div class="feature">
                <div class="feature-icon feature-veilig">🔒</div>
                <div class="feature-text">Veilig</div>
            </div>
            <div class="feature">
                <div class="feature-icon feature-snel">⚡</div>
                <div class="feature-text">Snel</div>
            </div>
        </div>
        
        <div class="footer">
            <p>Websockets Project - 2026</p>
        </div>
    </div>
</body>
</html>
